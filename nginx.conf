events { worker_connections 4096; }

http {
  # ── Upstream — round-robin across API instances ──────────────────────────
  upstream api {
    least_conn;                        # route to least-busy instance
    server api:4000;
    keepalive 64;
  }

  # ── Rate limit zones (backed by nginx shared memory) ────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ── Gzip ────────────────────────────────────────────────────────────────
  gzip on;
  gzip_types application/json text/plain text/css application/javascript;
  gzip_min_length 1000;

  server {
    listen 80;
    server_name api.verdura.in;

    # Redirect to HTTPS in production
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name api.verdura.in;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Auth endpoints — tight rate limit ──────────────────────────────
    location /api/v1/auth {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── All other API ──────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;
    }

    # ── Health check (no rate limit, no logging) ───────────────────────
    location /health {
      proxy_pass http://api;
      access_log off;
    }
  }
}
